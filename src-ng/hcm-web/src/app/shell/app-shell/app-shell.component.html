<mat-sidenav-container class="shell-container">

  <!-- SIDEBAR -->
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-brand">
      <mat-icon>local_hospital</mat-icon>
      <span>HCMS</span>
    </div>

    <mat-nav-list>
      <a mat-list-item
         *ngFor="let item of visibleNav"
         [routerLink]="item.route"
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <div class="sidebar-footer">
      <span class="username">{{ auth.getUsername() }}</span>
      <button mat-icon-button (click)="auth.logout()" title="Sign out">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <!-- MAIN CONTENT -->
  <mat-sidenav-content class="main-content">
    <!-- TOP BAR -->
    <mat-toolbar color="primary" class="topbar">
      <span class="topbar-title">Healthcare Case Management</span>
      <span class="spacer"></span>
      <!-- Notification bell placeholder -->
      <button mat-icon-button title="Notifications">
        <mat-icon>notifications_none</mat-icon>
      </button>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
